name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop

  pull_request:

  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java (Required for Android/Gradle builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # ← bumps Dart SDK to 3.5.x
          channel: 'stable'
          cache: true

      # Verify installed versions
      - name: Check Flutter version
        run: flutter --version

      - name: Check Java version
        run: java -version

      # Cache pub dependencies for faster builds
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Check formatting (optional but recommended)
      - name: Verify formatting
        run: dart format .

      # Static code analysis
      - name: Analyze project source
        run: flutter analyze

      # Run unit/widget tests
      - name: Run tests
        run: flutter test --verbose

      # Build release APK
      - name: Build APK
        run: flutter build apk --release

      # Build release APK
      - name: Build AAB File
        run: flutter build appbundle --release

      # Debug APK output path
      - name: Verify APK generated
        run: ls -la build/app/outputs/flutter-apk/

      # Debug AAB output path
      - name: Verify APK generated
        run: ls -la build/app/outputs/bundle/release/

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Upload AAB artifact
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: App-release-AAB
          path: build/app/outputs/bundle/release/app-release.aab

  build_ios:
    runs-on: macos-latest        # ← iOS MUST use macOS
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      - name: Import Certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: build/ios/iphoneos/Runner.app