name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - develop

  pull_request:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java (Required for Android/Gradle builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      # Verify installed versions
      - name: Check Flutter version
        run: flutter --version

      - name: Check Java version
        run: java -version

      # Cache pub dependencies for faster builds
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Check formatting (optional but recommended)
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Static code analysis
      - name: Analyze project source
        run: flutter analyze

      # Run unit/widget tests
      - name: Run tests
        run: flutter test --verbose

      # Build release APK
      - name: Build APK
        run: flutter build apk --release

      # Debug APK output path
      - name: Verify APK generated
        run: ls -la build/app/outputs/flutter-apk/

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk